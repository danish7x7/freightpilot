name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:

# lint/typecheck/test per service, plus the L3 contract gate (spectral lint +
# oasdiff breaking-change check + generated-client drift check). The drift check covers BOTH
# the client (client/src/api) and the agent (services/agent/src/api) — each regenerates its
# committed clients from contracts/*.yaml and fails on any diff. Eval gate lands at L6 (§9).
jobs:
  node-services:
    name: node · ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [booking, agent]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: services/${{ matrix.service }}/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      # Exercises the tsc emit (e.g. booking's dist/db/migrate.js, which make
      # migrate-booking runs in-container) — typecheck is noEmit and wouldn't catch it.
      - run: pnpm build
      # L2 DoD (agent only — booking has no gen:api): the agent's API clients are generated
      # in CI and must match the committed contracts. Guards against a committed client
      # drifting from contracts/*.yaml (Phase 1's lesson: a committed client without a drift
      # check is a toothless guarantee). Mirrors the client job's drift gate below.
      - name: Regenerate agent API clients from contracts
        if: matrix.service == 'agent'
        run: pnpm gen:api
      - name: Fail if the generated agent clients drifted from the contracts
        if: matrix.service == 'agent'
        run: git diff --exit-code src/api

  client:
    name: node · client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # L3 DoD: the TS client is generated in CI and must match the committed contract.
      - name: Regenerate API client from contract
        run: pnpm gen:api
      - name: Fail if the generated client drifted from the contract
        run: git diff --exit-code src/api

  client-e2e:
    name: node · client e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('client/pnpm-lock.yaml') }}
      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium
      # Narrowed-L4 DoD: search→quote happy path. Hermetic (rates API mocked at the
      # network layer) — no backend needed. Live compose-stack E2E deferred (ADR-0004).
      - name: Playwright E2E (mocked rates API)
        run: pnpm e2e

  rates-service:
    name: java · rates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/rates
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # `verify` runs Surefire unit tests AND Failsafe (*IT) integration tests, which
      # spin up Postgres via Testcontainers (Docker is available on ubuntu runners).
      - run: mvn -B -q verify

  booking-it:
    name: node · booking integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/booking
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: services/booking/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Data-layer DoD: migrations apply cleanly to a real Postgres (Testcontainers on
      # the runner's native Docker) and the schema behaves. Unit tests run in node-services.
      - name: Drizzle migration + schema integration test
        run: pnpm test:integration

  contracts:
    name: contracts · lint + breaking-change
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: contracts/pnpm-lock.yaml
      - name: Install spectral
        working-directory: contracts
        run: pnpm install --frozen-lockfile
      # L3 DoD: all specs lint clean against the FreightPilot ruleset (§5 error
      # envelope + X-Request-Id conventions are enforced as custom rules).
      - name: Spectral lint (all specs)
        working-directory: contracts
        run: pnpm lint
      # Regression-guards the custom §5 rules: fails if they stop catching violations.
      - name: Ruleset self-test
        working-directory: contracts
        run: pnpm test:ruleset
      # L3 DoD: breaking-change check on PRs. Compares each spec to its version on
      # the PR base branch; a newly-added spec (no base version) is skipped.
      - name: Breaking-change check vs base (oasdiff)
        if: github.event_name == 'pull_request'
        env:
          OASDIFF_VERSION: "1.23.0"
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          tarball="oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz"
          rel="https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}"
          curl -fsSL "${rel}/${tarball}" -o "/tmp/${tarball}"
          curl -fsSL "${rel}/checksums.txt" -o /tmp/oasdiff_checksums.txt
          # Pin + integrity-check the downloaded binary (supply-chain surface).
          ( cd /tmp && grep " ${tarball}\$" oasdiff_checksums.txt | sha256sum -c - )
          tar -xzf "/tmp/${tarball}" -C /tmp oasdiff
          # Explicit refspec so origin/${BASE_REF} actually resolves — actions/checkout
          # sets a narrow refspec, so a bare `git fetch origin main` would only write
          # FETCH_HEAD and the breaking-change check below would silently skip everything.
          git fetch --no-tags --depth=1 origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          git rev-parse --verify --quiet "origin/${BASE_REF}" >/dev/null \
            || { echo "::error::could not resolve base ref origin/${BASE_REF}"; exit 1; }
          rc=0
          for spec in contracts/*.openapi.yaml; do
            if git cat-file -e "origin/${BASE_REF}:${spec}" 2>/dev/null; then
              git show "origin/${BASE_REF}:${spec}" > /tmp/base_spec.yaml
              echo "::group::oasdiff breaking — ${spec} vs origin/${BASE_REF}"
              /tmp/oasdiff breaking /tmp/base_spec.yaml "${spec}" --fail-on ERR || rc=1
              echo "::endgroup::"
            else
              echo "No base version of ${spec} on origin/${BASE_REF} — new spec, skipping."
            fi
          done
          exit $rc
