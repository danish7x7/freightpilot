name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:

# L0 CI is deliberately minimal: lint/typecheck + a hello-world test per service.
# Contract checks (spectral/oasdiff) arrive at L3, the eval gate at L6 (MASTER_PLAN §9).
jobs:
  node-services:
    name: node · ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [booking, agent]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: services/${{ matrix.service }}/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  client:
    name: node · client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  rates-service:
    name: java · rates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/rates
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # `verify` runs Surefire unit tests AND Failsafe (*IT) integration tests, which
      # spin up Postgres via Testcontainers (Docker is available on ubuntu runners).
      - run: mvn -B -q verify
