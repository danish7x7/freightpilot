id: tools-hold-then-book-conversation
tier: tools
description: "Conversation state → next call: a quote was just held; 'go ahead and book it' must choose create_booking for that quote_id."
input:
  messages:
    - role: user
      content: "Hold quote 11111111-1111-4111-8111-111111111111."
    - role: assistant
      content: "Quote 11111111-1111-4111-8111-111111111111 is now held and ready to book."
    - role: user
      content: "Great — go ahead and book it under reference GLOBEX-7."
expect:
  kind: tool
  tool: create_booking
  args:
    quote_id: "11111111-1111-4111-8111-111111111111"
    shipper_ref: "GLOBEX-7"
recording:
  provider: gemini
