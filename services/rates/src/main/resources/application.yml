server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: rates-service
  # API JSON is snake_case (§5); Java fields stay camelCase. Null fields (e.g. a BASE
  # breakdown line's calc/rate_bps) are omitted.
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
  # DataSource is supplied by the environment (SPRING_DATASOURCE_URL / _USERNAME /
  # _PASSWORD) — see docker-compose.yml. No creds are hardcoded here.
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Migrations run on startup; a failed migration fails startup, keeping the
    # container unhealthy (readiness-for-free). Seed data is NOT here — it is
    # applied separately by `make seed` (see db/seed/seed.sql).
